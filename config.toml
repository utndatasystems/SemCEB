[general.ground_truth]
model_name = "gpt-5.4-nano"
system_prompt = "The user will provide a claim and some relevant context.\nYour job is to determine whether the claim is true for the given context.\nUse the following format to provide your answer:\nAnswer: <Your answer here. The answer should be either True or False>"

[general.data]
# Number of rows loaded from the main dataset table for filtering.
# Related tables are filtered to match those selected rows.
# Rows are shuffled deterministically before selection.
# Join scale factor is applied on top restricting explosion of row counts due to joining
scale_factor = 1000
# Number of rows loaded from the main dataset table for joining.
# Kept separate from scale_factor because join output sizes can grow quickly.
join_scale_factor = 100
types = []
categories = []


