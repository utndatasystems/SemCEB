[general.ground_truth]
model_name = "gpt-4o-mini"
system_prompt = "Evaluate if the following statement. Only answer with True or False."

[general.data]
# Number of rows loaded from the main dataset table for filtering.
# Related tables are filtered to match those selected rows.
# Rows are shuffled deterministically before selection.
# Join scale factor is applied on top restricting explosion of row counts due to joining
scale_factor = 10
# Number of rows loaded from the main dataset table for joining.
# Kept separate from scale_factor because join output sizes can grow quickly.
join_scale_factor = 10
categories = [
    "Simple Base-Table Predicate",
    "Complex Base-Table Predicate",
    "Simple Join",
    "Complex Join",
    "Self Join",
] # ["equality", "inequality"]


# Mandatory
[[algorithms]]
name = "Extrapolation Sampling"
version = "1.0.0"
filename = "extrapolated_sampling.py"
class = "ExtrapolatedSampling"

# Optional: Overwriting general ground truth configuration
[algorithms.ground_truth]
model_name = "gpt-4o-mini"
system_prompt = "Evaluate if the following statement. Only answer with True or False."

# Optional: Depends on implementation
[algorithms.algorithm_kwargs]
model_name = "gpt-4o-mini"
system_prompt = "Evaluate if the following statement. Only answer with True or False."
sampling_frac = 0.1


# Mandatory
[[algorithms]]
name = "Custom Algorithm Template"
version = "1.0.0"
filename = "custom_algorithm_template.py"
class = "CustomAlgorithmTemplate"

# Optional: Overwriting general ground truth configuration
[algorithms.ground_truth]
model_name = "gpt-3.5-turbo"
# system_prompt = ... # e.g. not used

# Optional: Depends on implementation
[algorithms.algorithm_kwargs]
my_special_algorithm_argument = 42
