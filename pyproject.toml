[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "semantic-selectivity-estimation"
version = "0.1.0"
description = "A benchmark pipeline for running selectivity estimation algorithms and plotting the results."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pandas",
    "matplotlib",
    "seaborn",
    "rich",
    "lotus-ai",
    "weasyprint",
    "boto3",
]

[project.scripts]
semantic-selectivity = "run:main"

[tool.setuptools]
py-modules = ["run"]

[tool.setuptools.packages.find]
include = ["runner*", "utils*", "data*", "results*"]
exclude = ["queries*", "documentation*"]
