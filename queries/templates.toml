[[query_templates]]
# Example: 'Is this description about education technology?'
name = "EducationTechnology"
version = "1.0.0"
description = "Semantic filtering template for learning tools, tutoring, and student support"
dataset = "dataset1"
column = "description"
query_structure = "Is this description about {education_topic}?"
education_topic = [
    "student writing support",
    "online tutoring",
    "personalized learning",
    "education technology",
]

[[query_templates]]
# Example: 'Is this customer message about a billing problem?'
name = "CustomerSupportBilling"
version = "1.0.0"
description = "Semantic filtering template for billing-related customer support messages"
dataset = "dataset2"
column = "customer_message"
query_structure = "Is this customer message about a {issue_type}?"
issue_type = [
    "billing problem",
    "refund request",
    "subscription cancellation",
    "payment issue",
]
